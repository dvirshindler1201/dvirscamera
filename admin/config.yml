backend:
  name: github
  repo: dvirshindler1201/dvirscamera
  branch: main
  base_url: https://dvirscamera-oauth.dvir-shindler.workers.dev
  auth_endpoint: /auth

media_folder: "assets/images"
public_folder: "/assets/images"

collections:

  - name: "hero"
    label: "🎬 Hero Slideshow"
    files:
      - name: "hero"
        label: "Hero Slideshow Photos"
        file: "data/hero.json"
        fields:
          - label: "Slides"
            name: "slides"
            widget: "list"
            summary: "{{fields.alt}}"
            fields:
              - label: "Photo"
                name: "src"
                widget: "image"
                media_folder: "/assets/images/hero"
                public_folder: "/assets/images/hero"
                hint: "Upload landscape (horizontal) photos only for best results"
              - {label: "Alt Text / Description", name: "alt", widget: "string"}

  - name: "hotels"
    label: "🏨 Hotels"
    files:
      - name: "500rai"
        label: "500Rai Floating Resort"
        file: "data/hotels/500rai.json"
        fields:
          - {label: "Hotel Name", name: "name", widget: "string"}
          - {label: "Location", name: "location", widget: "string"}
          - label: "Photos"
            name: "photos"
            widget: "list"
            summary: "{{fields.caption}}"
            fields:
              - label: "Photo"
                name: "src"
                widget: "image"
                media_folder: "/assets/images/hotels/500rai"
                public_folder: "/assets/images/hotels/500rai"
              - {label: "Caption", name: "caption", widget: "string"}
              - {label: "Location Tag", name: "tag", widget: "string", default: "Khao Sok, Thailand"}
              - label: "Orientation"
                name: "orientation"
                widget: "select"
                options: ["landscape", "portrait"]
                default: "landscape"

      - name: "grand-hyatt"
        label: "Grand Hyatt Erawan Bangkok"
        file: "data/hotels/grand-hyatt.json"
        fields:
          - {label: "Hotel Name", name: "name", widget: "string"}
          - {label: "Location", name: "location", widget: "string"}
          - label: "Photos"
            name: "photos"
            widget: "list"
            summary: "{{fields.caption}}"
            fields:
              - label: "Photo"
                name: "src"
                widget: "image"
                media_folder: "/assets/images/hotels/grand-hyatt"
                public_folder: "/assets/images/hotels/grand-hyatt"
              - {label: "Caption", name: "caption", widget: "string"}
              - {label: "Location Tag", name: "tag", widget: "string", default: "Bangkok, Thailand"}
              - label: "Orientation"
                name: "orientation"
                widget: "select"
                options: ["landscape", "portrait"]

      - name: "ban-sainai"
        label: "Ban Sainai Resort"
        file: "data/hotels/ban-sainai.json"
        fields:
          - {label: "Hotel Name", name: "name", widget: "string"}
          - {label: "Location", name: "location", widget: "string"}
          - label: "Photos"
            name: "photos"
            widget: "list"
            summary: "{{fields.caption}}"
            fields:
              - label: "Photo"
                name: "src"
                widget: "image"
                media_folder: "/assets/images/hotels/ban-sainai"
                public_folder: "/assets/images/hotels/ban-sainai"
              - {label: "Caption", name: "caption", widget: "string"}
              - {label: "Location Tag", name: "tag", widget: "string", default: "Krabi, Thailand"}
              - label: "Orientation"
                name: "orientation"
                widget: "select"
                options: ["landscape", "portrait"]

      - name: "thantara"
        label: "Thantara Resort"
        file: "data/hotels/thantara.json"
        fields:
          - {label: "Hotel Name", name: "name", widget: "string"}
          - {label: "Location", name: "location", widget: "string"}
          - label: "Photos"
            name: "photos"
            widget: "list"
            summary: "{{fields.caption}}"
            fields:
              - label: "Photo"
                name: "src"
                widget: "image"
                media_folder: "/assets/images/hotels/thantara"
                public_folder: "/assets/images/hotels/thantara"
              - {label: "Caption", name: "caption", widget: "string"}
              - {label: "Location Tag", name: "tag", widget: "string", default: "Chiang Mai, Thailand"}
              - label: "Orientation"
                name: "orientation"
                widget: "select"
                options: ["landscape", "portrait"]

      - name: "moxy"
        label: "Moxy by Marriott"
        file: "data/hotels/moxy.json"
        fields:
          - {label: "Hotel Name", name: "name", widget: "string"}
          - {label: "Location", name: "location", widget: "string"}
          - label: "Photos"
            name: "photos"
            widget: "list"
            summary: "{{fields.caption}}"
            fields:
              - label: "Photo"
                name: "src"
                widget: "image"
                media_folder: "/assets/images/hotels/moxy"
                public_folder: "/assets/images/hotels/moxy"
              - {label: "Caption", name: "caption", widget: "string"}
              - {label: "Location Tag", name: "tag", widget: "string", default: "Bangkok, Thailand"}
              - label: "Orientation"
                name: "orientation"
                widget: "select"
                options: ["landscape", "portrait"]

  - name: "travel"
    label: "✈️ Travel Photos"
    files:
      - name: "travel"
        label: "Travel Gallery"
        file: "data/travel.json"
        fields:
          - label: "Photos"
            name: "photos"
            widget: "list"
            summary: "{{fields.caption}} — {{fields.location}}"
            fields:
              - label: "Photo"
                name: "src"
                widget: "image"
                media_folder: "/assets/images/travel"
                public_folder: "/assets/images/travel"
              - {label: "Caption", name: "caption", widget: "string"}
              - {label: "Location", name: "location", widget: "string"}
              - label: "Orientation"
                name: "orientation"
                widget: "select"
                options: ["landscape", "portrait"]
                default: "landscape"

  - name: "lifestyle"
    label: "💑 Lifestyle Photos"
    files:
      - name: "lifestyle"
        label: "Lifestyle Gallery"
        file: "data/lifestyle.json"
        fields:
          - label: "Photos"
            name: "photos"
            widget: "list"
            summary: "{{fields.caption}} — {{fields.location}}"
            fields:
              - label: "Photo"
                name: "src"
                widget: "image"
                media_folder: "/assets/images/lifestyle"
                public_folder: "/assets/images/lifestyle"
              - {label: "Caption", name: "caption", widget: "string"}
              - {label: "Location", name: "location", widget: "string"}
              - label: "Orientation"
                name: "orientation"
                widget: "select"
                options: ["landscape", "portrait"]
                default: "landscape"
